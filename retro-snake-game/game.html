<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <audio id="bg-music" src="background-music.mp3" loop></audio>

    <div class="game-header">
        <button id="top-pause-btn" class="pause-trigger-btn">⏸ Pause</button>
        <div class="score-container">
            <span id="score">Score: 0</span> | 
            <span id="high-score">Best: 0</span>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="300" height="300"></canvas>

        <div id="countdownOverlay" class="countdown-overlay">
            <div id="countdownNumber" class="countdown-number">3</div>
        </div>

        <div id="pauseMenu" class="pause-overlay">
            <div class="pause-title">GAME PAUSED</div>
            <button class="menu-btn resume" id="resume-btn">Resume Game</button>
            <button class="menu-btn leaderboard" id="view-settings-btn">⚙️ Control Settings</button>
            <button class="menu-btn leaderboard" id="view-leaderboard-btn">🏆 Global Leaderboard</button>
            <button class="menu-btn restart" id="restart-btn">Restart</button>
            <button class="menu-btn exit" id="exit-btn">Exit to Menu</button>
        </div>

        <div id="gameSettingsMenu" class="pause-overlay">
            <div class="pause-title">⚙️ CONTROLS</div>
            <div class="setting-row">
                <label>Theme Option:</label>
                <button id="theme-toggle" class="icon-btn" style="width:100%; text-align:center;">🌓 Toggle Theme</button>
            </div>
            <div class="setting-row">
                <label>Input System Type:</label>
                <select id="control-type-select">
                    <option value="dpad">On-Screen D-PAD Box</option>
                    <option value="swipe">Full-Screen Touch Swipe</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Controller Dimensions Scale:</label>
                <input type="range" id="control-scale-slider" min="0.6" max="1.5" step="0.05" value="1.0">
            </div>
            <div class="setting-row">
                <label>Vertical Position Move:</label>
                <input type="range" id="control-y-slider" min="0" max="150" step="5" value="15">
            </div>
            <button class="menu-btn resume" id="close-settings-btn">Save Rules</button>
        </div>

        <div id="leaderboardMenu" class="pause-overlay">
            <div class="pause-title">🏆 GLOBAL TOP 5</div>
            <div class="leaderboard-list" id="leaderboard-list">
                <div class="leaderboard-itemLoading">Connecting...</div>
            </div>
            <button class="menu-btn exit" id="close-leaderboard-btn">Back</button>
        </div>
    </div>

    <div class="controls-wrapper" id="controls-wrapper-frame">
        <div class="controls" id="dpad-box">
            <button class="btn" id="up-btn">▲</button>
            <button class="btn" id="left-btn">◀</button>
            <button class="btn" id="right-btn">▶</button>
            <button class="btn" id="down-btn">▼</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const database = firebase.database();

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const pauseMenu = document.getElementById("pauseMenu");
        const gameSettingsMenu = document.getElementById("gameSettingsMenu");
        const leaderboardMenu = document.getElementById("leaderboardMenu");
        const leaderboardList = document.getElementById("leaderboard-list");
        const topPauseBtn = document.getElementById("top-pause-btn");
        const bgMusic = document.getElementById("bg-music");

        const countdownOverlay = document.getElementById("countdownOverlay");
        const countdownNumber = document.getElementById("countdownNumber");

        const controlTypeSelect = document.getElementById("control-type-select");
        const controlScaleSlider = document.getElementById("control-scale-slider");
        const controlYSlider = document.getElementById("control-y-slider");
        const controlsWrapperFrame = document.getElementById("controls-wrapper-frame");
        const dpadBox = document.getElementById("dpad-box");
        const themeToggle = document.getElementById("theme-toggle");

        const gridSize = 15;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let dx = 0;
        let dy = 0;
        let food = { x: 5, y: 5 };
        let score = 0;
        let highScore = localStorage.getItem("snake_high_score") || 0;
        let isPaused = false;
        let isCountingDown = false;
        let gameSpeed = 100;
        let gameInterval = null;

        highScoreElement.textContent = `Best: ${highScore}`;

        function startBgMusicRandom() {
            if (!bgMusic) return;
            const playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    if (bgMusic.duration && !isNaN(bgMusic.duration)) {
                        bgMusic.currentTime = Math.random() * bgMusic.duration;
                    } else {
                        bgMusic.addEventListener('loadedmetadata', () => {
                            bgMusic.currentTime = Math.random() * bgMusic.duration;
                        }, { once: true });
                    }
                }).catch(() => {});
            }
        }

        function stopBgMusic() {
            if (bgMusic) bgMusic.pause();
        }

        function refreshControllerDesign() {
            const savedType = localStorage.getItem('control_type') || 'dpad';
            const savedScale = localStorage.getItem('control_scale') || '1.0';
            const savedY = localStorage.getItem('control_y') || '15';

            if (savedType === 'swipe') {
                controlsWrapperFrame.style.display = 'none';
            } else {
                controlsWrapperFrame.style.display = 'flex';
                controlsWrapperFrame.style.marginTop = `${savedY}px`;
                dpadBox.style.transform = `scale(${savedScale})`;
            }

            const currentTheme = localStorage.getItem('theme') || 'dark-theme';
            document.body.className = currentTheme;
        }

        function drawGame() {
            if (isPaused || isCountingDown) return;

            let headX = snake[0].x + dx;
            let headY = snake[0].y + dy;

            // RESTORED: Wall-wrapping functionality (Snake teleports to other side)
            if (headX < 0) headX = tileCount - 1;
            if (headX >= tileCount) headX = 0;
            if (headY < 0) headY = tileCount - 1;
            if (headY >= tileCount) headY = 0;

            const head = { x: headX, y: headY };

            if (dx !== 0 || dy !== 0) {
                if (collisionSelf(head)) {
                    alert(`Game Over! Final Score: ${score}`);
                    resetGame();
                    return;
                }
                snake.unshift(head);

                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    scoreElement.textContent = `Score: ${score}`;
                    if (score > highScore) {
                        highScore = score;
                        highScoreElement.textContent = `Best: ${highScore}`;
                        localStorage.setItem("snake_high_score", highScore);
                    }
                    generateFood();
                } else {
                    snake.pop();
                }
            }

            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff3333";
            ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);

            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#00ff00" : "#00cc00";
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function collisionSelf(head) {
            return snake.some((part, index) => index !== 0 && part.x === head.x && part.y === head.y);
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            if (snake.some(p => p.x === food.x && p.y === food.y)) generateFood();
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.textContent = `Score: ${score}`;
            isPaused = false;
            isCountingDown = false;
            pauseMenu.style.display = "none";
            countdownOverlay.style.display = "none";
            generateFood();
            startBgMusicRandom();
        }

        function triggerResumeCountdown() {
            pauseMenu.style.display = "none";
            gameSettingsMenu.style.display = "none";
            leaderboardMenu.style.display = "none";
            isCountingDown = true;
            countdownOverlay.style.display = "flex";

            let count = 3;
            countdownNumber.textContent = count;
            countdownNumber.style.animation = 'none';
            countdownNumber.offsetHeight;
            countdownNumber.style.animation = 'bounceScale 1s ease-in-out infinite';

            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.textContent = count;
                } else if (count === 0) {
                    countdownNumber.textContent = "GO!";
                } else {
                    clearInterval(countInterval);
                    countdownOverlay.style.display = "none";
                    isCountingDown = false;
                    isPaused = false;
                    startBgMusicRandom();
                }
            }, 1000);
        }

        topPauseBtn.addEventListener("click", () => {
            if (isCountingDown) return;
            isPaused = true;
            pauseMenu.style.display = "flex";
            stopBgMusic();
        });

        document.getElementById("resume-btn").addEventListener("click", () => {
            triggerResumeCountdown();
        });

        document.addEventListener("keydown", e => {
            if (isPaused || isCountingDown) return;
            if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
            if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
            if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
            if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
        });

        document.getElementById("up-btn").addEventListener("click", () => { if (!isPaused && !isCountingDown && dy === 0) { dx = 0; dy = -1; } });
        document.getElementById("down-btn").addEventListener("click", () => { if (!isPaused && !isCountingDown && dy === 0) { dx = 0; dy = 1; } });
        document.getElementById("left-btn").addEventListener("click", () => { if (!isPaused && !isCountingDown && dx === 0) { dx = -1; dy = 0; } });
        document.getElementById("right-btn").addEventListener("click", () => { if (!isPaused && !isCountingDown && dx === 0) { dx = 1; dy = 0; } });

        document.getElementById("view-settings-btn").addEventListener("click", () => {
            pauseMenu.style.display = "none";
            controlTypeSelect.value = localStorage.getItem('control_type') || 'dpad';
            controlScaleSlider.value = localStorage.getItem('control_scale') || '1.0';
            controlYSlider.value = localStorage.getItem('control_y') || '15';
            gameSettingsMenu.style.display = "flex";
        });

        themeToggle.addEventListener('click', () => {
            const body = document.body;
            if (body.classList.contains('dark-theme')) {
                body.className = 'light-theme';
                localStorage.setItem('theme', 'light-theme');
            } else {
                body.className = 'dark-theme';
                localStorage.setItem('theme', 'dark-theme');
            }
        });

        document.getElementById("close-settings-btn").addEventListener("click", () => {
            localStorage.setItem('control_type', controlTypeSelect.value);
            localStorage.setItem('control_scale', controlScaleSlider.value);
            localStorage.setItem('control_y', controlYSlider.value);
            refreshControllerDesign();
            gameSettingsMenu.style.display = "none";
            pauseMenu.style.display = "flex";
        });

        document.getElementById("restart-btn").addEventListener("click", () => {
            if (confirm("Restart game?")) resetGame();
        });

        document.getElementById("exit-btn").addEventListener("click", () => {
            window.location.href = "index.html";
        });

        refreshControllerDesign();
        generateFood();
        gameInterval = setInterval(drawGame, gameSpeed);
        startBgMusicRandom();
    </script>
</body>
</html>
