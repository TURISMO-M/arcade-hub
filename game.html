<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-header">
        <h1 class="game-title">Snake</h1>
        <div id="score">Score: 0</div>
    </div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="300" height="300"></canvas>

        <div id="pauseMenu" class="pause-overlay">
            <div class="pause-title">GAME PAUSED</div>
            <button class="menu-btn resume" id="resume-btn">Resume Game</button>
            <button class="menu-btn restart" id="restart-btn">Restart</button>
            <button class="menu-btn exit" id="exit-btn">Exit to Hub</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="up-btn">▲</button>
        <button class="btn" id="left-btn">◀</button>
        <button class="btn" id="right-btn">▶</button>
        <button class="btn" id="down-btn">▼</button>
        <button class="btn" id="center-pause-btn" style="top:48px; left:48px; font-size:12px; font-weight:bold;">⏸</button>
    </div>

    <script>
        // Set Theme immediately based on what was saved on the home page
        document.body.className = localStorage.getItem('theme') || 'dark-theme';

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const pauseMenu = document.getElementById("pauseMenu");

        const gridSize = 15; 
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1; 
        let dy = 0; 
        let score = 0;
        let gameInterval;
        let isPaused = false;

        function drawGame() {
            if (isPaused) return; // Completely freeze processing if paused

            updateSnakePosition();
            if (checkGameOver()) {
                alert("Game Over! Score: " + score);
                resetGame();
                return;
            }
            checkFoodCollision();
            clearCanvas();
            drawFood();
            drawSnake();
            gameInterval = setTimeout(drawGame, 140);
        }

        function clearCanvas() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#00ff00"; 
            for(let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 1, gridSize - 1);
            }
        }

        function drawFood() {
            ctx.fillStyle = "#ff0000"; 
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }

            let nextY = snake[0].y + dy;

            if (nextX >= tileCount) nextX = 0;
